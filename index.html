<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RAW color pallete</title>
  <style>
    :root { --bg:#121214; --surface:#1c1c1f; --border:#2a2a2e; --text:#ececf1; --muted:#9898a4; --accent:#a78bfa; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family:"Segoe UI",system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
    .wrap { max-width: 980px; margin:0 auto; padding:1.5rem 1.25rem 3rem; }
    h1 { margin:0 0 .25rem; font-size:1.35rem; font-weight:600; }
    .sub { margin:0 0 1.2rem; color:var(--muted); font-size:.92rem; }
    .panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.1rem; margin-bottom:1rem; }
    .row { display:flex; flex-wrap:wrap; gap:1rem; align-items:flex-end; }
    label { display:block; font-size:.75rem; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin-bottom:.35rem; }
    input[type="text"], input[type="number"], select { background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:.5rem .65rem; font-size:.95rem; }
    input[type="color"] { width:52px; height:40px; padding:2px; border:1px solid var(--border); border-radius:8px; background:var(--bg); cursor:pointer; }
    .field-hex { flex:1 1 140px; min-width:130px; }
    .field-hex input { width:100%; }
    .field-count { width:100px; }
    .field-count input { width:100%; }
    .field-mode { flex:1 1 210px; }
    .field-mode select { width:100%; }
    .btn { border:1px solid var(--accent); background:rgba(167,139,250,.12); color:var(--text); padding:.55rem 1rem; border-radius:8px; font-size:.9rem; cursor:pointer; }
    .btn:hover { background:rgba(167,139,250,.22); }
    .btn-small { padding:.3rem .55rem; font-size:.75rem; }
    .hint { margin-top:.75rem; color:var(--muted); font-size:.82rem; }
    .err { color:#f87171; font-size:.86rem; margin-top:.5rem; }
    .palette-head { margin:1rem 0 .5rem; display:flex; align-items:center; justify-content:space-between; gap:.5rem; }
    .palette-title { color:var(--muted); font-size:.86rem; font-weight:600; text-transform:capitalize; }
    .swatches { display:flex; flex-wrap:wrap; gap:6px; }
    .sw { width:76px; text-align:center; }
    .sw-chip { height:44px; border-radius:8px; border:1px solid rgba(255,255,255,.12); margin-bottom:4px; }
    .sw-tone { font-size:.65rem; color:var(--muted); }
    .sw-hex { font-size:.6rem; font-family:ui-monospace,monospace; word-break:break-all; color:var(--muted); cursor:pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>RAW color pallete</h1>
    <p class="sub">Генерация тона 0–100: OKLCH + якорь seed, шаги по степени (Stevens‑подобно).</p>
    <div class="panel">
      <div class="row">
        <div>
          <label>Цвет</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="color" id="pick" value="#6750a4" />
            <div class="field-hex"><input type="text" id="hex" value="#6750A4" placeholder="#RRGGBB" spellcheck="false" /></div>
          </div>
        </div>
        <div class="field-count">
          <label>Свотчей</label>
          <input type="number" id="count" min="1" max="100" value="11" />
        </div>
        <div class="field-mode">
          <label>Режим</label>
          <select id="mode">
            <option value="tonal">Color</option>
            <option value="theme" selected>Color + 2 NeutralVariant</option>
          </select>
        </div>
      </div>
      <p class="hint">JSON для Figma Tokens / Tokens Studio: <code>colors → имя группы → 1…N</code> (<code>value</code> + <code>type: color</code>).</p>
      <div class="err" id="err" hidden></div>
    </div>
    <div id="preview"></div>
  </div>

  <script type="module">
    import { CorePalette, Hct, argbFromHex, hexFromArgb } from "https://esm.sh/@material/material-color-utilities@0.4.0";
    import { interpolate, formatHex, parse } from "https://esm.sh/culori@4.0.1";

    const pick = document.getElementById('pick');
    const hexInput = document.getElementById('hex');
    const countEl = document.getElementById('count');
    const modeEl = document.getElementById('mode');
    const preview = document.getElementById('preview');
    const err = document.getElementById('err');
    const groupExports = new Map();
    let debounce;

    const normalizeHex = (v) => {
      let s = String(v || '').trim();
      if (!s.startsWith('#')) s = `#${s}`;
      if (/^#[0-9a-fA-F]{3}$/.test(s)) s = `#${s[1]}${s[1]}${s[2]}${s[2]}${s[3]}${s[3]}`;
      return s.toUpperCase();
    };
    const isValidHex = (v) => /^#[0-9a-fA-F]{6}$/.test(v);

    /**
     * Метки 0..100 без пропусков (например при N=100 round давал 49 и 51 без 50).
     * Последний свотч всегда 100, остальные: floor(i * 100 / (n - 1)).
     */
    const toneSteps = (count) => {
      const n = Math.max(1, Math.min(100, Math.round(Number(count)) || 1));
      if (n === 1) return [50];
      const arr = [];
      for (let i = 0; i < n; i += 1) {
        if (i === n - 1) arr.push(100);
        else arr.push(Math.floor((i * 100) / (n - 1)));
      }
      return arr;
    };

    const tonesFromPalette = (palette, steps) => steps.map((tone) => ({ tone, hex: hexFromArgb(palette.tone(tone)) }));

    /** Степень меньше 1 — больше шагов в тенях (грубо по Stevens для сенсорных шкал). */
    const STEVENS_GAMMA = 0.52;

    function perceptualStep(t) {
      const x = Math.max(0, Math.min(1, t));
      return Math.pow(x, STEVENS_GAMMA);
    }

    /**
     * Чёрный → seed → белый в OKLCH (меньше «грязи», чем HCT по тону).
     * Точный seed обязателен на индексе, соответствующем Hct.tone.
     */
    function tonesFromSeedOkAnchored(seedHex, stepTones) {
      const n = stepTones.length;
      if (n === 0) return [];
      const seedUpper = seedHex.toUpperCase();
      const seedParsed = parse(seedUpper);
      const black = parse('#000000');
      const white = parse('#ffffff');
      const mixDark = interpolate([black, seedParsed], 'oklch');
      const mixLight = interpolate([seedParsed, white], 'oklch');

      const hct = Hct.fromInt(argbFromHex(seedUpper));
      const anchorIdx = Math.round((hct.tone / 100) * (n - 1));

      const out = [];
      for (let i = 0; i < n; i += 1) {
        let color;
        if (n === 1) {
          color = seedParsed;
        } else if (anchorIdx <= 0) {
          color = mixLight(perceptualStep(i / (n - 1)));
        } else if (anchorIdx >= n - 1) {
          color = mixDark(perceptualStep(i / (n - 1)));
        } else if (i < anchorIdx) {
          color = mixDark(perceptualStep(i / anchorIdx));
        } else if (i > anchorIdx) {
          color = mixLight(perceptualStep((i - anchorIdx) / (n - 1 - anchorIdx)));
        } else {
          color = seedParsed;
        }
        let hex = formatHex(color);
        if (typeof hex === 'string' && !hex.startsWith('#')) hex = `#${hex}`;
        if (i === anchorIdx) hex = seedUpper;
        out.push({ tone: stepTones[i], hex: hex.toUpperCase() });
      }
      return out;
    }
    const buildTheme = (hex, steps) => {
      const core = CorePalette.of(argbFromHex(hex));
      return {
        primary: tonesFromPalette(core.a1, steps),
        neutral: tonesFromPalette(core.n1, steps),
        neutralVariant: tonesFromPalette(core.n2, steps),
      };
    };

    /**
     * Формат как в Figma Tokens: вложенная группа + стили 1…N (не плоский массив).
     * Импорт: Tokens Studio → Import → JSON (или плагин Figma Tokens).
     */
    function makeFigmaTokensJson(groupName, samples) {
      const g = String(groupName || 'Palette').replace(/[<>:"/\\|?*\x00-\x1F]/g, '').trim() || 'Palette';
      const inner = {};
      samples.forEach((s, idx) => {
        inner[String(idx + 1)] = {
          value: s.hex,
          type: 'color',
        };
      });
      return {
        colors: {
          [g]: inner,
        },
      };
    }

    async function fetchGroupNames(hexList) {
      const uniq = [...new Set(hexList.map((h) => h.replace('#', '').toUpperCase()))];
      if (!uniq.length) return new Map();
      try {
        const url = `https://api.color.pizza/v1/?values=${uniq.join(',')}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('name-api');
        const data = await res.json();
        const map = new Map();
        for (const c of data.colors || []) {
          const key = String(c.requestedHex || c.hex || '').replace('#', '').toUpperCase();
          if (key) map.set(`#${key}`, c.name || c.bestName || '');
        }
        return map;
      } catch {
        return new Map();
      }
    }

    function safeFileName(name) {
      return String(name || 'Palette').replace(/[<>:"/\\|?*\x00-\x1F]/g, '').trim() || 'Palette';
    }

    function downloadJson(file, content) {
      const blob = new Blob([JSON.stringify(content, null, 2)], { type: 'application/json;charset=utf-8' });
      const a = document.createElement('a');
      a.download = file;
      a.href = URL.createObjectURL(blob);
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function exportGroup(groupKey) {
      const pack = groupExports.get(groupKey);
      if (!pack) return;
      const file = `${safeFileName(pack.groupName)}.json`;
      const content = makeFigmaTokensJson(pack.groupName, pack.samples);
      downloadJson(file, content);
    }

    function swatchBlock(title, groupKey, samples, groupName) {
      const root = document.createElement('div');
      const head = document.createElement('div');
      head.className = 'palette-head';
      const titleNode = document.createElement('div');
      titleNode.className = 'palette-title';
      titleNode.textContent = title;
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'btn btn-small';
      button.textContent = `JSON: ${groupName}`;
      button.addEventListener('click', () => exportGroup(groupKey));
      head.appendChild(titleNode);
      head.appendChild(button);
      root.appendChild(head);

      const row = document.createElement('div');
      row.className = 'swatches';
      for (const { tone, hex } of samples) {
        const node = document.createElement('div');
        node.className = 'sw';
        node.innerHTML = `<div class="sw-chip" style="background:${hex}"></div><div class="sw-tone">${tone}</div><div class="sw-hex" title="Нажми, чтобы скопировать">${hex}</div>`;
        row.appendChild(node);
      }
      root.appendChild(row);
      return root;
    }

    async function render() {
      err.hidden = true;
      groupExports.clear();
      const hex = normalizeHex(hexInput.value);
      if (!isValidHex(hex)) {
        preview.innerHTML = '';
        err.textContent = 'Некорректный HEX. Нужен формат #RRGGBB.';
        err.hidden = false;
        return;
      }
      const steps = toneSteps(countEl.value);
      const mode = modeEl.value;
      try {
        preview.innerHTML = '';
        const namesApi = await fetchGroupNames([hex]);
        const seedName = namesApi.get(hex.toUpperCase()) || 'Palette';
        if (mode === 'tonal') {
          const tonal = tonesFromSeedOkAnchored(hex, steps);
          const groupName = seedName;
          groupExports.set('tonal', { groupName, samples: tonal });
          preview.appendChild(swatchBlock('Color', 'tonal', tonal, groupName));
        } else {
          const theme = buildTheme(hex, steps);
          const groupNames = {
            primary: seedName,
            neutral: `${seedName} Neutral`,
            neutralVariant: `${seedName} NeutralVariant`,
          };
          const displayNames = {
            primary: 'Color',
            neutral: 'Neutral',
            neutralVariant: 'NeutralVariant',
          };
          for (const key of ['primary', 'neutral', 'neutralVariant']) {
            groupExports.set(key, { groupName: groupNames[key], samples: theme[key] });
            preview.appendChild(swatchBlock(displayNames[key], key, theme[key], groupNames[key]));
          }
        }
      } catch (e) {
        preview.innerHTML = '';
        err.textContent = String(e?.message || e);
        err.hidden = false;
      }
    }

    const schedule = () => { clearTimeout(debounce); debounce = setTimeout(render, 80); };
    pick.addEventListener('input', () => { hexInput.value = pick.value.toUpperCase(); schedule(); });
    hexInput.addEventListener('input', () => { const h = normalizeHex(hexInput.value); if (isValidHex(h)) pick.value = h; schedule(); });
    preview.addEventListener('click', async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      if (!target.classList.contains('sw-hex')) return;
      const value = target.textContent?.trim();
      if (!value) return;
      try {
        await navigator.clipboard.writeText(value);
        target.title = `Скопировано: ${value}`;
      } catch {
        target.title = 'Не удалось скопировать';
      }
    });
    countEl.addEventListener('input', schedule);
    modeEl.addEventListener('change', schedule);
    render();
  </script>
</body>
</html>
